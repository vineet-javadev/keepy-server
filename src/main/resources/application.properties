# ===============================
# 🏗️ General App Configuration
# ===============================
spring.application.name=keepy-api
server.port=8080

# ===============================
# 🗄️ Database (MySQL) Configuration
# ===============================
# Update 'keepy_db' if you named your schema differently
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL}

# ===============================
# 🔒 Security & JWT Configuration
# ===============================
# Keep this secret! (Min 32 characters for HS256)
keepy.jwt.secret=${JWT_SECRET}
# 24 Hours in milliseconds
keepy.jwt.expiration=${JWT_EXPIRATION}

# ===============================
# ☁️ AWS S3 Configuration
# ===============================
aws.s3.bucket-name=${AWS_BUCKET_NAME}
aws.s3.region=${AWS_REGION}
aws.s3.access-key=${AWS_ACCESS_KEY}
aws.s3.secret-key=${AWS_SECRET_KEY}

# ===============================
# 📤 File Upload Limits
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB